<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>DS WORLD — Contact</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="logo">DS WORLD</div>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="hamburger"><span></span><span></span><span></span></div>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <h1>Contact us</h1>
      <p>Tell us about your project, and we’ll get back within 1–2 business days.</p>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <h2 class="section-title">Send a message</h2>
        <form id="contact-form">
          <div class="row">
            <input class="input" name="name" placeholder="Your name" required />
            <input class="input" type="email" name="email" placeholder="Email address" required />
          </div>
          <div class="row">
            <input class="input" name="phone" placeholder="Phone (optional)" />
            <input class="input" name="company" placeholder="Company (optional)" />
          </div>
          <div class="row">
            <textarea class="input" name="message" placeholder="How can we help?" required></textarea>
          </div>
          <div style="margin-top:1rem;">
            <button class="btn" type="submit">Submit</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer"><div class="container"><p>© 2025 DS WORLD. All rights reserved.</p></div></footer>
  <script src="script.js"></script>
</body>
</html>
